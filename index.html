<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bardo OS</title>
  <meta name="description" content="An offline reading instrument for the Bardo Thödröl — The Great Liberation Upon Hearing in the Intermediate State." />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FDFBF7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171412" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <header class="app-header">
    <button class="menu-toggle" id="btnMenu" aria-expanded="false" aria-controls="nav">
      Texts
      <svg class="menu-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <h1>Bardo OS</h1>
  </header>

  <nav class="nav" id="nav" aria-label="Texts of the cycle"></nav>

  <div class="shell">
    <main class="reader" id="reader"></main>
  </div>

  <div class="bottom-bar">
    <div class="bar-inner">

      <div class="bar-group" role="group" aria-label="Auto-scroll">
        <button class="bar-btn" id="btnSlower" aria-label="Scroll slower">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span class="speed-val" id="speedVal" aria-live="polite">2</span>
        <button class="bar-btn" id="btnFaster" aria-label="Scroll faster">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="bar-btn" id="btnPlay" aria-label="Start or pause auto-scroll" aria-pressed="false">
          <svg id="iconPlay" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
      </div>

      <div class="bar-group" role="group" aria-label="Reading mode">
        <button class="bar-btn btn-voice" id="btnVoice" aria-label="Voice mode — only the spoken layers" aria-pressed="false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7" y="7" width="10" height="10" transform="rotate(45 12 12)"/></svg>
        </button>
        <button class="bar-btn" id="btnFs" aria-label="Enter or leave fullscreen" aria-pressed="false">
          <svg id="iconExpand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
          <svg id="iconCompress" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M16 3v3a2 2 0 0 0 2 2h3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/><path d="M8 21v-3a2 2 0 0 0-2-2H3"/></svg>
        </button>
        <button class="bar-btn" id="btnTheme" aria-label="Day or night">
          <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <div class="bar-group lang-group" role="group" aria-label="Layers shown">
        <button class="bar-btn bar-btn-text" id="btnBo" aria-pressed="true">TIB</button>
        <button class="bar-btn bar-btn-text" id="btnPhon" aria-pressed="true">PHO</button>
        <button class="bar-btn bar-btn-text" id="btnEn" aria-pressed="true">ENG</button>
      </div>

      <div class="bar-group" role="group" aria-label="Text size">
        <button class="bar-btn" id="btnSmaller" aria-label="Smaller text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="bar-btn" id="btnLarger" aria-label="Larger text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
